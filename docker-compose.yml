# Local infrastructure for development. Start with: docker compose up -d
services:
  redis:
    image: redis:7.4-alpine
    # appendonly: bus streams surviving a Redis restart is an assumption the
    # later persistence work (NEG-14) builds on — baked in from the first commit.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
